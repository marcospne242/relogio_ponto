<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 text-white">

    <div class="w-full max-w-sm glass rounded-3xl p-8 shadow-2xl text-center">
        <h1 class="text-slate-400 uppercase tracking-widest text-xs font-semibold mb-1">Ponto Pessoal</h1>
        <p id="currentDate" class="text-slate-200 text-sm mb-8"></p>
        
        <div id="clock" class="text-6xl font-light font-mono tracking-tighter mb-8 text-blue-400">00:00:00</div>
        
        <button onclick="baterPonto()" class="w-full py-5 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 rounded-2xl font-bold text-lg shadow-lg shadow-blue-900/50 transition-all active:scale-95 border border-blue-400/20">
            Registrar Ponto
        </button>
    </div>

    <!-- Histórico mais elegante -->
    <div class="w-full max-w-sm mt-8 space-y-3">
        <h2 class="text-slate-500 text-xs font-bold uppercase ml-2">Hoje</h2>
        <div id="listaHistorico" class="space-y-3"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
            document.getElementById('currentDate').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function baterPonto() {
            const agora = new Date();
            const registro = {
                id: Date.now(),
                hora: agora.toLocaleTimeString('pt-BR')
            };
            let pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            pontos.unshift(registro);
            localStorage.setItem('pontos', JSON.stringify(pontos));
            carregarHistorico();
            // Feedback simples
            navigator.vibrate && navigator.vibrate(100);
        }

        function carregarHistorico() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            const container = document.getElementById('listaHistorico');
            if(pontos.length === 0) {
                container.innerHTML = '<p class="text-slate-600 text-sm text-center italic">Nenhum ponto hoje</p>';
                return;
            }
            container.innerHTML = pontos.map(p => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center text-sm">
                    <span class="text-slate-300">Entrada/Saída</span>
                    <span class="font-mono font-bold text-blue-300">${p.hora}</span>
                </div>
            `).join('');
        }
        carregarHistorico();
    </script>
</body>
</html>

    <script>
        // Lógica do Relógio
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('currentDate').innerText = now.toLocaleDateString('pt-BR');
        }
        setInterval(updateClock, 1000);

        // Lógica de Ponto
        function baterPonto() {
            const agora = new Date();
            const registro = {
                id: Date.now(),
                data: agora.toLocaleDateString('pt-BR'),
                hora: agora.toLocaleTimeString('pt-BR'),
                timestamp: agora.getTime()
            };

            let pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            pontos.unshift(registro);
            localStorage.setItem('pontos', JSON.stringify(pontos));
            
            alert('Ponto registrado com sucesso!');
            carregarHistorico();
        }

        function carregarHistorico() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            const container = document.getElementById('listaHistorico');
            container.innerHTML = pontos.map(p => `
                <div class="card p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold">${p.data}</p>
                        <p class="text-sm text-slate-400">${p.hora}</p>
                    </div>
                    <button onclick="deletarPonto(${p.id})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function deletarPonto(id) {
            let pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            pontos = pontos.filter(p => p.id !== id);
            localStorage.setItem('pontos', JSON.stringify(pontos));
            carregarHistorico();
        }

        function showPage(pageId) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('historico').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            if(pageId === 'historico') carregarHistorico();
        }

        function exportarCSV() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            let csv = "Data,Hora\n";
            pontos.forEach(p => csv += `${p.data},${p.hora}\n`);
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `resumo_ponto_${new Date().getMonth()+1}.csv`;
            a.click();
        }

        updateClock();
    </script>
</body>
</html>
