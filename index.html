<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto - Banco de Horas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style> body { background-color: #F8FAFC; } </style>
</head>
<body class="pb-24 font-sans text-slate-800">

    <!-- Tela Home -->
    <div id="home" class="flex flex-col items-center justify-center min-h-[85vh] p-4">
        <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-lg border border-slate-100 text-center">
            <h1 class="text-slate-400 uppercase tracking-widest text-xs font-bold mb-1">Ponto Pessoal</h1>
            <p id="currentDate" class="text-slate-500 text-sm mb-8"></p>
            <div id="clock" class="text-6xl font-light font-mono tracking-tighter mb-8 text-indigo-600">00:00:00</div>
            <button onclick="baterPonto()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-md transition-all active:scale-95">
                Registrar Ponto
            </button>
        </div>
    </div>

    <!-- Tela Histórico -->
    <div id="historico" class="hidden p-4 mt-6">
        <!-- Card de Saldo Total -->
        <div class="bg-white p-6 rounded-3xl shadow-lg border border-indigo-100 max-w-sm mx-auto mb-6 text-center">
            <h2 class="text-slate-400 text-xs font-bold uppercase">Saldo de Banco de Horas</h2>
            <div id="saldoTotal" class="text-4xl font-bold text-indigo-600 my-2">0.00h</div>
            <p class="text-xs text-slate-400">Total acumulado (Extra - Folgas)</p>
        </div>

        <!-- Adicionar Ajuste/Folga -->
        <h2 class="text-slate-400 text-xs font-bold uppercase ml-4 mb-4">Ajuste de Saldo (Folga/Extra)</h2>
        <div class="bg-white p-4 rounded-2xl mb-6 max-w-sm mx-auto border border-slate-100 shadow-sm">
            <div class="flex gap-2">
                <input type="number" step="0.5" id="ajusteInput" placeholder="Ex: -5 (folga) ou 2" class="bg-slate-50 p-2 rounded-lg border border-slate-200 text-sm w-2/3">
                <button onclick="adicionarAjuste()" class="w-1/3 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow-sm">OK</button>
            </div>
            <p class="text-[10px] text-slate-400 mt-2">Use números negativos para abater horas (ex: -5).</p>
        </div>

        <h2 class="text-slate-400 text-xs font-bold uppercase ml-4 mb-4">Resumo por Dia</h2>
        <div id="listaResumo" class="space-y-4 max-w-sm mx-auto"></div>
    </div>

    <!-- Menu Inferior -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 p-4 flex justify-around items-center shadow-lg z-50">
        <button onclick="showPage('home')" class="flex flex-col items-center text-slate-500 hover:text-indigo-600"><i class="fa-solid fa-clock text-xl"></i><span class="text-[10px] mt-1">Início</span></button>
        <button onclick="showPage('historico')" class="flex flex-col items-center text-slate-500 hover:text-indigo-600"><i class="fa-solid fa-list text-xl"></i><span class="text-[10px] mt-1">Histórico</span></button>
        <button onclick="exportarCSV()" class="flex flex-col items-center text-slate-500 hover:text-indigo-600"><i class="fa-solid fa-download text-xl"></i><span class="text-[10px] mt-1">Baixar</span></button>
    </nav>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
            document.getElementById('currentDate').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function calcularBanco() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            const ajustes = JSON.parse(localStorage.getItem('bancoAjustes') || '[]');
            
            // Grupos por dia
            const grupos = pontos.reduce((acc, p) => {
                if(!acc[p.data]) acc[p.data] = [];
                acc[p.data].push(p);
                return acc;
            }, {});

            let totalSaldo = 0;

            Object.keys(grupos).forEach(data => {
                const registros = grupos[data].sort((a,b) => a.hora.localeCompare(b.hora));
                let totalSegundos = 0;
                for(let i = 0; i < registros.length - 1; i += 2) {
                    let start = new Date("1970-01-01 " + registros[i].hora);
                    let end = new Date("1970-01-01 " + registros[i+1].hora);
                    totalSegundos += (end - start) / 1000;
                }
                const worked = totalSegundos / 3600;
                const [d,m,y] = data.split('/');
                const diaSemana = new Date(y, m-1, d).getDay();
                const meta = (diaSemana >= 1 && diaSemana <= 5) ? 5 : (diaSemana === 6 ? 4 : 0);
                totalSaldo += (worked - meta);
            });

            // Adiciona ajustes manuais
            totalSaldo += ajustes.reduce((sum, a) => sum + parseFloat(a.valor), 0);
            
            document.getElementById('saldoTotal').innerText = totalSaldo.toFixed(2) + 'h';
        }

        function adicionarAjuste() {
            const val = document.getElementById('ajusteInput').value;
            if(!val) return;
            let ajustes = JSON.parse(localStorage.getItem('bancoAjustes') || '[]');
            ajustes.push({ id: Date.now(), valor: val });
            localStorage.setItem('bancoAjustes', JSON.stringify(ajustes));
            document.getElementById('ajusteInput').value = '';
            carregarHistorico();
        }

        function carregarHistorico() {
            calcularBanco();
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            const container = document.getElementById('listaResumo');
            
            const grupos = pontos.reduce((acc, p) => {
                if(!acc[p.data]) acc[p.data] = [];
                acc[p.data].push(p);
                return acc;
            }, {});

            container.innerHTML = Object.keys(grupos).sort((a,b) => new Date(b.split('/').reverse()) - new Date(a.split('/').reverse())).map(data => {
                const idDiv = data.replace(/\//g, '-');
                const registros = grupos[data].sort((a,b) => a.hora.localeCompare(b.hora));
                let totalSegundos = 0;
                for(let i = 0; i < registros.length - 1; i += 2) {
                    let start = new Date("1970-01-01 " + registros[i].hora);
                    let end = new Date("1970-01-01 " + registros[i+1].hora);
                    totalSegundos += (end - start) / 1000;
                }
                const worked = totalSegundos / 3600;
                const [d,m,y] = data.split('/');
                const meta = (new Date(y, m-1, d).getDay() >= 1 && new Date(y, m-1, d).getDay() <= 5) ? 5 : 4;
                
                return `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-5 cursor-pointer flex justify-between items-center" onclick="document.getElementById('details-${idDiv}').classList.toggle('hidden')">
                        <div>
                            <p class="font-bold text-slate-700">${data}</p>
                            <p class="text-xs text-slate-500">${worked.toFixed(2)}h / Meta: ${meta}h</p>
                        </div>
                        <span class="text-xs font-bold ${worked >= meta ? 'text-emerald-500' : 'text-slate-400'}">
                            ${(worked - meta).toFixed(2)}h
                        </span>
                    </div>
                    <div id="details-${idDiv}" class="hidden bg-slate-50 p-4 border-t border-slate-100">
                        ${registros.map(r => `
                            <div class="flex justify-between items-center mb-2 text-sm">
                                <span class="text-slate-600 font-mono">${r.hora}</span>
                                <button onclick="deletarPonto(${r.id})" class="text-red-400 text-xs">Excluir</button>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        // ... (Funções baterPonto, deletarPonto, showPage e exportarCSV mantêm-se iguais) ...
        function baterPonto() {
            const agora = new Date();
            const registro = { id: Date.now(), data: agora.toLocaleDateString('pt-BR'), hora: agora.toLocaleTimeString('pt-BR') };
            let pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            pontos.unshift(registro);
            localStorage.setItem('pontos', JSON.stringify(pontos));
            carregarHistorico();
        }
        function deletarPonto(id) {
            let pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            pontos = pontos.filter(p => p.id !== id);
            localStorage.setItem('pontos', JSON.stringify(pontos));
            carregarHistorico();
        }
        function showPage(pageId) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('historico').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            if(pageId === 'historico') carregarHistorico();
        }
        function exportarCSV() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            let csv = "Data,Hora\n" + pontos.map(p => `${p.data},${p.hora}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ponto_completo.csv';
            a.click();
        }
    </script>
</body>
</html>
