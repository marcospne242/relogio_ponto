<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto - Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style> body { background-color: #F8FAFC; } </style>
</head>
<body class="pb-24 font-sans text-slate-800">

    <div id="home" class="flex flex-col items-center justify-center min-h-[85vh] p-4">
        <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-lg border border-slate-100 text-center">
            <h1 class="text-slate-400 uppercase tracking-widest text-xs font-bold mb-1">Ponto Pessoal</h1>
            <p id="currentDate" class="text-slate-500 text-sm mb-8"></p>
            <div id="clock" class="text-6xl font-light font-mono tracking-tighter mb-8 text-indigo-600">00:00:00</div>
            <button onclick="baterPonto()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-md transition-all active:scale-95">Registrar Ponto</button>
        </div>
    </div>

    <div id="historico" class="hidden p-4 mt-6">
        <div class="bg-white p-6 rounded-3xl shadow-lg border border-indigo-100 max-w-sm mx-auto mb-6 text-center">
            <h2 class="text-slate-400 text-xs font-bold uppercase">Saldo Banco de Horas (Total)</h2>
            <div id="saldoTotal" class="text-3xl font-bold text-indigo-600 my-1">00:00</div>
        </div>

        <div class="max-w-sm mx-auto flex justify-between items-center bg-white p-3 rounded-xl shadow-sm mb-4 border border-slate-100">
            <button onclick="changeMonth(-1)" class="p-2 text-indigo-600"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="mesAtualDisplay" class="font-bold text-indigo-900 text-lg">--/----</span>
            <button onclick="changeMonth(1)" class="p-2 text-indigo-600"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="max-w-sm mx-auto space-y-4">
            
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                <h2 class="text-slate-400 text-xs font-bold uppercase mb-2">Adicionar Ajuste (Extra/Débito)</h2>
                <input type="date" id="dataAjuste" class="bg-slate-50 p-2 rounded-lg border text-sm w-full mb-2">
                <div class="flex gap-2">
                    <input type="number" step="0.5" id="ajusteInput" placeholder="Horas (+ ou -)" class="bg-slate-50 p-2 rounded-lg border text-sm w-1/2">
                    <button onclick="adicionarAjuste()" class="w-1/2 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold">Adicionar Ajuste</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                <h2 class="text-slate-400 text-xs font-bold uppercase mb-2">Registrar Folga</h2>
                <input type="date" id="dataFolga" class="bg-slate-50 p-2 rounded-lg border text-sm w-full mb-2">
                <button onclick="registrarFolga()" class="w-full py-2 bg-amber-500 text-white rounded-lg text-sm font-bold">Marcar como Folga</button>
            </div>

            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                <h2 class="text-slate-400 text-xs font-bold uppercase mb-2">Ponto Esquecido</h2>
                <div class="flex gap-2 mb-2">
                    <input type="date" id="dataPonto" class="bg-slate-50 p-2 rounded-lg border text-sm w-1/2">
                    <input type="time" id="horaPonto" class="bg-slate-50 p-2 rounded-lg border text-sm w-1/2">
                </div>
                <button onclick="adicionarManual()" class="w-full py-2 bg-emerald-600 text-white rounded-lg text-sm font-bold">Adicionar</button>
            </div>

            <div id="listaResumo" class="space-y-4"></div>
            
            <button onclick="limparTudo()" class="w-full mt-6 py-2 bg-red-50 text-red-500 border border-red-200 rounded-lg text-xs font-bold">Limpar Todos os Dados</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 p-4 flex justify-around items-center shadow-lg z-50">
        <button onclick="showPage('home')" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-clock text-xl"></i><span class="text-[10px] mt-1">Início</span></button>
        <button onclick="showPage('historico')" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-list text-xl"></i><span class="text-[10px] mt-1">Histórico</span></button>
        <button onclick="exportarRelatorio()" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-download text-xl"></i><span class="text-[10px] mt-1">Baixar</span></button>
    </nav>

    <script>
        let currentViewDate = new Date();

        function formatarHoras(decimal) {
            const totalMinutos = Math.round(decimal * 60);
            const h = Math.floor(Math.abs(totalMinutos) / 60);
            const m = Math.abs(totalMinutos) % 60;
            const sinal = decimal < 0 ? "-" : "";
            return `${sinal}${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
            document.getElementById('currentDate').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function changeMonth(offset) {
            currentViewDate.setMonth(currentViewDate.getMonth() + offset);
            carregarHistorico();
        }

        function getStats() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            const ajustes = JSON.parse(localStorage.getItem('bancoAjustes') || '[]');
            const folgas = JSON.parse(localStorage.getItem('folgas') || '[]');
            const grupos = {};
            const todos = [...pontos.map(p => ({type:'ponto', ...p})), ...ajustes.map(a => ({type:'ajuste', ...a}))];
            todos.sort((a,b) => new Date(a.data.split('/').reverse()) - new Date(b.data.split('/').reverse()));
            todos.forEach(item => {
                if(!grupos[item.data]) grupos[item.data] = { pontos: [], ajuste: 0, isFolga: folgas.includes(item.data) };
                if(item.type === 'ponto') grupos[item.data].pontos.push(item);
                else grupos[item.data].ajuste += parseFloat(item.valor);
            });
            folgas.forEach(f => { if(!grupos[f]) grupos[f] = { pontos: [], ajuste: 0, isFolga: true }; });
            return grupos;
        }

        function carregarHistorico() {
            const grupos = getStats();
            const container = document.getElementById('listaResumo');
            let saldoAcumulado = 0;
            const mesFormatado = `${String(currentViewDate.getMonth() + 1).padStart(2, '0')}/${currentViewDate.getFullYear()}`;
            document.getElementById('mesAtualDisplay').innerText = mesFormatado;

            Object.keys(grupos).forEach(data => {
                const regs = grupos[data].pontos.sort((a,b) => a.hora.localeCompare(b.hora));
                let s = 0;
                for(let i=0; i<regs.length-1; i+=2) s += (new Date("1970-01-01 "+regs[i+1].hora) - new Date("1970-01-01 "+regs[i].hora))/3600000;
                const [d,m,y] = data.split('/');
                const dayFinished = regs.length % 2 === 0 && regs.length > 0;
                const meta = (grupos[data].isFolga || !dayFinished) ? 0 : ((new Date(y, m-1, d).getDay() >= 1 && new Date(y, m-1, d).getDay() <= 5) ? 5 : 4);
                saldoAcumulado += (s - meta + grupos[data].ajuste);
            });
            document.getElementById('saldoTotal').innerText = formatarHoras(saldoAcumulado);

            const chavesOrdenadas = Object.keys(grupos).sort((a,b) => new Date(b.split('/').reverse()) - new Date(a.split('/').reverse()));
            container.innerHTML = chavesOrdenadas.filter(d => d.endsWith(mesFormatado)).map(dia => {
                const regs = grupos[dia].pontos.sort((a,b) => a.hora.localeCompare(b.hora));
                let s = 0;
                for(let i=0; i<regs.length-1; i+=2) s += (new Date("1970-01-01 "+regs[i+1].hora) - new Date("1970-01-01 "+regs[i].hora))/3600000;
                const [d,m,y] = dia.split('/');
                const dayFinished = regs.length % 2 === 0 && regs.length > 0;
                const meta = (grupos[dia].isFolga || !dayFinished) ? 0 : ((new Date(y, m-1, d).getDay() >= 1 && new Date(y, m-1, d).getDay() <= 5) ? 5 : 4);
                const saldoDia = s - meta + grupos[dia].ajuste;
                return `
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-4 cursor-pointer flex justify-between items-center" onclick="document.getElementById('d-${dia.replace(/\//g,'-')}').classList.toggle('hidden')">
                        <div><p class="font-bold text-sm">${dia} ${grupos[dia].isFolga ? '<span class="text-amber-500">(Folga)</span>' : ''}</p>
                        <p class="text-[10px] text-slate-500">${formatarHoras(s)} trab. | Meta: ${meta}h</p></div>
                        <span class="text-xs font-bold ${saldoDia >= 0 ? 'text-emerald-600' : 'text-rose-600'}">${formatarHoras(saldoDia)}</span>
                    </div>
                    <div id="d-${dia.replace(/\//g,'-')}" class="hidden bg-slate-50 p-3 border-t">
                        ${regs.map(r => `<div class="flex justify-between text-xs mb-1"><span>${r.hora}</span><button onclick="deletarPonto(${r.id})" class="text-red-400 font-bold">Excluir</button></div>`).join('')}
                        ${grupos[dia].ajuste != 0 ? `<div class="text-xs text-indigo-600 mt-2 font-bold">Ajuste: ${grupos[dia].ajuste}h</div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // Funções de suporte
        function baterPonto() { const a = new Date(); let p = JSON.parse(localStorage.getItem('pontos') || '[]'); p.unshift({id: Date.now(), data: a.toLocaleDateString('pt-BR'), hora: a.toLocaleTimeString('pt-BR')}); localStorage.setItem('pontos', JSON.stringify(p)); carregarHistorico(); }
        function registrarFolga() { const d = document.getElementById('dataFolga').value; if(!d) return; const [y,m,j] = d.split('-'); let f = JSON.parse(localStorage.getItem('folgas') || '[]'); f.push(`${j}/${m}/${y}`); localStorage.setItem('folgas', JSON.stringify(f)); carregarHistorico(); }
        function adicionarAjuste() { const d = document.getElementById('dataAjuste').value, v = document.getElementById('ajusteInput').value; if(!d || !v) return; const [y,m,j] = d.split('-'); let a = JSON.parse(localStorage.getItem('bancoAjustes') || '[]'); a.push({id: Date.now(), data: `${j}/${m}/${y}`, valor: v}); localStorage.setItem('bancoAjustes', JSON.stringify(a)); carregarHistorico(); }
        function adicionarManual() { const d = document.getElementById('dataPonto').value, h = document.getElementById('horaPonto').value; if(!d || !h) return; const [y,m,j] = d.split('-'); let p = JSON.parse(localStorage.getItem('pontos') || '[]'); p.unshift({id: Date.now(), data: `${j}/${m}/${y}`, hora: h}); localStorage.setItem('pontos', JSON.stringify(p)); carregarHistorico(); }
        function deletarPonto(id) { let p = JSON.parse(localStorage.getItem('pontos') || '[]'); p = p.filter(x => x.id !== id); localStorage.setItem('pontos', JSON.stringify(p)); carregarHistorico(); }
        function limparTudo() { const confirmacao = prompt("CUIDADO! Isso apagará TODO o histórico. Digite RESET para confirmar:"); if (confirmacao === "RESET") { localStorage.clear(); carregarHistorico(); alert("Dados apagados!"); } }
        function showPage(p) { document.getElementById('home').classList.add('hidden'); document.getElementById('historico').classList.add('hidden'); document.getElementById(p).classList.remove('hidden'); if(p === 'historico') carregarHistorico(); }
        
        function exportarRelatorio() { 
            const grupos = getStats(); 
            let txt = "RELATÓRIO DE PONTO\n------------------------------\n";
            Object.keys(grupos).sort((a,b) => new Date(a.split('/').reverse()) - new Date(b.split('/').reverse())).forEach(d => { 
                const regs = grupos[d].pontos; 
                let s = 0; 
                for(let i=0; i<regs.length-1; i+=2) s += (new Date("1970-01-01 "+regs[i+1].hora) - new Date("1970-01-01 "+regs[i].hora))/3600000; 
                const [dy,mo,yr] = d.split('/'); 
                const dayFinished = regs.length % 2 === 0 && regs.length > 0;
                const meta = (grupos[d].isFolga || !dayFinished) ? 0 : ((new Date(yr, mo-1, dy).getDay()>=1 && new Date(yr, mo-1, dy).getDay()<=5) ? 5 : 4);
                txt += `Data: ${d}\nTrabalhado: ${formatarHoras(s)}\nMeta: ${meta}h\nAjuste: ${grupos[d].ajuste}h\nSaldo do dia: ${formatarHoras(s - meta + grupos[d].ajuste)}\n------------------------------\n`; 
            }); 
            const b = new Blob([txt], {type: 'text/plain'}); 
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(b); 
            a.download = 'relatorio_ponto.txt'; 
            a.click(); 
        }
    </script>
</body>
</html>
