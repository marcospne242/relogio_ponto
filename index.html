<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #F8FAFC; } /* Fundo bem clarinho */
    </style>
</head>
<body class="pb-24 font-sans text-slate-800">

    <div id="home" class="flex flex-col items-center justify-center min-h-[85vh] p-4">
        <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-lg border border-slate-100 text-center">
            <h1 class="text-slate-400 uppercase tracking-widest text-xs font-bold mb-1">Ponto Pessoal</h1>
            <p id="currentDate" class="text-slate-500 text-sm mb-8"></p>
            
            <div id="clock" class="text-6xl font-light font-mono tracking-tighter mb-8 text-indigo-600">00:00:00</div>
            
            <button onclick="baterPonto()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-md transition-all active:scale-95">
                Registrar Ponto
            </button>
        </div>
    </div>

    <div id="historico" class="hidden p-4 mt-6">
        <h2 class="text-slate-400 text-xs font-bold uppercase ml-4 mb-4">Histórico</h2>
        <div id="listaHistorico" class="space-y-3 max-w-sm mx-auto"></div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 p-4 flex justify-around items-center shadow-lg">
        <button onclick="showPage('home')" class="flex flex-col items-center text-slate-500 hover:text-indigo-600 transition-colors">
            <i class="fa-solid fa-clock text-xl"></i><span class="text-[10px] mt-1">Início</span>
        </button>
        <button onclick="showPage('historico')" class="flex flex-col items-center text-slate-500 hover:text-indigo-600 transition-colors">
            <i class="fa-solid fa-list text-xl"></i><span class="text-[10px] mt-1">Histórico</span>
        </button>
        <button onclick="exportarCSV()" class="flex flex-col items-center text-slate-500 hover:text-indigo-600 transition-colors">
            <i class="fa-solid fa-download text-xl"></i><span class="text-[10px] mt-1">Baixar</span>
        </button>
    </nav>

    <script>
        // Relógio e Data (sem piscar)
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
            document.getElementById('currentDate').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function baterPonto() {
            const agora = new Date();
            const registro = {
                id: Date.now(),
                data: agora.toLocaleDateString('pt-BR'),
                hora: agora.toLocaleTimeString('pt-BR')
            };
            let pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            pontos.unshift(registro);
            localStorage.setItem('pontos', JSON.stringify(pontos));
            alert('Ponto registrado!');
            carregarHistorico();
        }

        function carregarHistorico() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            const container = document.getElementById('listaHistorico');
            container.innerHTML = pontos.length > 0 ? pontos.map(p => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center text-sm shadow-sm border border-slate-100">
                    <div>
                        <p class="text-slate-400 text-xs">${p.data}</p>
                        <p class="font-bold text-lg text-slate-700">${p.hora}</p>
                    </div>
                    <button onclick="deletarPonto(${p.id})" class="text-slate-300 hover:text-red-500 p-2 transition-colors"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('') : '<p class="text-center text-slate-400 mt-10 italic">Nenhum ponto registrado hoje.</p>';
        }

        function deletarPonto(id) {
            if(!confirm('Excluir este registro?')) return;
            let pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            pontos = pontos.filter(p => p.id !== id);
            localStorage.setItem('pontos', JSON.stringify(pontos));
            carregarHistorico();
        }

        function showPage(pageId) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('historico').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            if(pageId === 'historico') carregarHistorico();
        }

        function exportarCSV() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            if(pontos.length === 0) return alert("Sem dados para exportar");
            let csv = "Data,Hora\n" + pontos.map(p => `${p.data},${p.hora}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'resumo_ponto.csv';
            a.click();
        }
    </script>
</body>
</html>
