<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Ponto Pessoal</title>
    <link rel="manifest" href="manifest.json">
    <!-- Tailwind para design moderno e responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .card { background: #1e293b; border-radius: 1rem; }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="p-6 text-center">
        <h1 class="text-2xl font-bold text-blue-400">PontoPessoal</h1>
        <p id="currentDate" class="text-slate-400 text-sm"></p>
    </header>

    <!-- App Content -->
    <main id="app" class="px-4">
        
        <!-- Tela Home -->
        <section id="home" class="space-y-6">
            <div class="card p-8 text-center shadow-lg">
                <div id="clock" class="text-5xl font-mono font-bold mb-4">00:00:00</div>
                <button onclick="baterPonto()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-lg shadow-blue-500/30 shadow-lg transition-transform active:scale-95">
                    <i class="fa-solid fa-clock mr-2"></i> Registrar Ponto
                </button>
            </div>
        </section>

        <!-- Tela Histórico -->
        <section id="historico" class="hidden space-y-4">
            <h2 class="text-xl font-semibold mb-4">Histórico Recente</h2>
            <div id="listaHistorico" class="space-y-3">
                <!-- Itens inseridos via JS -->
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full glass border-t border-slate-700 p-4 flex justify-around">
        <button onclick="showPage('home')" class="text-blue-400"><i class="fa-solid fa-house text-xl"></i></button>
        <button onclick="showPage('historico')" class="text-slate-400"><i class="fa-solid fa-list text-xl"></i></button>
        <button onclick="exportarCSV()" class="text-slate-400"><i class="fa-solid fa-download text-xl"></i></button>
    </nav>

    <script>
        // Lógica do Relógio
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('currentDate').innerText = now.toLocaleDateString('pt-BR');
        }
        setInterval(updateClock, 1000);

        // Lógica de Ponto
        function baterPonto() {
            const agora = new Date();
            const registro = {
                id: Date.now(),
                data: agora.toLocaleDateString('pt-BR'),
                hora: agora.toLocaleTimeString('pt-BR'),
                timestamp: agora.getTime()
            };

            let pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            pontos.unshift(registro);
            localStorage.setItem('pontos', JSON.stringify(pontos));
            
            alert('Ponto registrado com sucesso!');
            carregarHistorico();
        }

        function carregarHistorico() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            const container = document.getElementById('listaHistorico');
            container.innerHTML = pontos.map(p => `
                <div class="card p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold">${p.data}</p>
                        <p class="text-sm text-slate-400">${p.hora}</p>
                    </div>
                    <button onclick="deletarPonto(${p.id})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function deletarPonto(id) {
            let pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            pontos = pontos.filter(p => p.id !== id);
            localStorage.setItem('pontos', JSON.stringify(pontos));
            carregarHistorico();
        }

        function showPage(pageId) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('historico').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            if(pageId === 'historico') carregarHistorico();
        }

        function exportarCSV() {
            const pontos = JSON.parse(localStorage.getItem('pontos') || '[]');
            let csv = "Data,Hora\n";
            pontos.forEach(p => csv += `${p.data},${p.hora}\n`);
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `resumo_ponto_${new Date().getMonth()+1}.csv`;
            a.click();
        }

        updateClock();
    </script>
</body>
</html>
